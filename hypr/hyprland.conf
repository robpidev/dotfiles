# Hyprland Configuration
# https://wiki.hypr.land/Configuring/

# ==================
# MONITOR CONFIG
# ==================
# Monitors from existing configuration
# monitor=,preferred,auto,auto


# monitor=eDP-1, 1920x1080@144, 0x0, 1

monitor = , preferred -vsync,auto,1

# ==================
# ENVIRONMENT VARS
# ==================


env = XCURSOR_THEME,Sweet-cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GTK_THEME,Sweet-Dark-v40
env = GTK_FONT_NAME,Inter 13

env = QT_QPA_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_QPA_PLATFORMTHEME_QT6,gtk3
env = TERMINAL,kitty

# ==================
# STARTUP APPS
# ==================
# exec-once = bash -c "wl-paste --watch cliphist store &"
# exec-once = dms run
# exec-once = wl-paste --watch cliphist store &
exec-once = qs -c noctalia-shell
exec-once = /usr/lib/mate-polkit/polkit-mate-authentication-agent-1

# ==================
# INPUT CONFIG
# ==================
input {
    kb_layout = us
    # kb_variant = intl

    numlock_by_default = true

    follow_mouse = 1

    touchpad {
      natural_scroll = true
    }
}

# ==================
# GENERAL LAYOUT
# ==================
general {
    gaps_in = 1
    gaps_out = 0,2,0,0
    border_size = 2  # off in niri


    col.active_border = rgba(7c4dffcc) rgba(009688cc) 45deg
    col.inactive_border = rgba(7c4dff55) rgba(00968855) 90deg


    layout = dwindle
}

# ==================
# DECORATION
# ==================
decoration {

    rounding = 7
    rounding_power = 4

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 30
        render_power = 5
        offset = 0 5
        color = rgba(00000070)
    }



    blur {
        enabled = true
        size = 10
        passes = 3

        ignore_opacity = true
        new_optimizations = true
        xray = false

        noise = 0.02
        contrast = 1.1
        vibrancy = 0.2
        vibrancy_darkness = 0.3
    }
}

# ==================
# ANIMATIONS
# ==================
animations {
    enabled = true

    animation = windowsIn, 1, 3, default
    animation = windowsOut, 1, 3, default
    animation = workspaces, 1, 5, default
    animation = windowsMove, 1, 4, default
    animation = fade, 1, 3, default
    animation = border, 1, 3, default
    animation = specialWorkspace, 1, 3, default, slidefadevert 80%
}

# ==================
# LAYOUTS
# ==================
dwindle {
    preserve_split = true
}

master {
    mfact = 0.5
}

# ==================
# MISC
# ==================
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 1
}

# ==================
# WINDOW RULES
# ==================
windowrule = match:class ^(xdg-desktop-portal.*)$, float on
windowrule = match:initial_title ^(Untitled.*)$, float on
windowrule = match:class thunar, float on, size 1000 600
windowrule = match:class mpv, float on, size 720 405

windowrule = workspace special:communication, match:title ^(WhatsApp Web)$
windowrule = workspace special:communication, match:title ^(Telegram.*)$
windowrule = workspace special:multipmedia, match:title ^(Youtube.*)$

workspace = special:communication, gapsout:80, gapsin:40
workspace = special:multimedia, gapsout:80, gapsin:40
workspace = special:apps, gapsout:80, gapsin:40

# windowrulev2 = tile, class:^(org\.wezfurlong\.wezterm)$
#
# windowrulev2 = rounding 12, class:^(org\.gnome\.)
# windowrulev2 = noborder, class:^(org\.gnome\.)
#
# windowrulev2 = tile, class:^(gnome-control-center)$
# windowrulev2 = tile, class:^(pavucontrol)$
# windowrulev2 = tile, class:^(nm-connection-editor)$
#
# windowrulev2 = float, class:^(gnome-calculator)$
# windowrulev2 = float, class:^(galculator)$
# windowrulev2 = float, class:^(blueman-manager)$
# windowrulev2 = float, class:^(org\.gnome\.Nautilus)$
# windowrulev2 = float, class:^(steam)$
#
# windowrulev2 = noborder, class:^(org\.wezfurlong\.wezterm)$
# windowrulev2 = noborder, class:^(Alacritty)$
# windowrulev2 = noborder, class:^(zen)$
# windowrulev2 = noborder, class:^(com\.mitchellh\.ghostty)$
# # windowrulev2 = noborder, class:^(kitty)$
#
# windowrulev2 = float, class:^(firefox)$, title:^(Picture-in-Picture)$
# windowrulev2 = float, class:^(zoom)$
#
# windowrule = match:class ^(brave-browser)$, initialTitle:^(Untitled.*)$, float
#

# windowrulev2 = opacity 0.9 0.9, floating:0, focus:0

# layerrule = no_anim on, match:namespace ^(quickshell)$
# layerrule = blur on,match:namespace ^quickshell.*
# layerrule = ignore_alpha 0.0,match:namespace ^quickshell.*

layerrule = blur on,match:namespace ^noctalia-.*
layerrule = ignore_alpha 0.3,match:namespace ^noctalia-.*
# layerrule = no_anim on,match:namespace ^noctalia-.*

# ==================
# KEYBINDINGS
# ==================
$mod = SUPER

# === Application Launchers ===
bind = $mod, Return, exec, kitty
bind = $mod, B, exec, brave
# bind = $mod, SUPER_L, exec, dms ipc call spotlight toggle
bind = $mod, SUPER_L, exec, qs -c noctalia-shell ipc call launcher toggle
# bind = $mod, V, exec, dms ipc call clipboard toggle
bind = $mod, V, exec, qs -c noctalia-shell ipc call launcher clipboard
bind = $mod SHIFT, semicolon, exec, qs -c noctalia-shell ipc call launcher calculator
bind = $mod, semicolon, exec, qs -c noctalia-shell ipc call launcher emoji
bind = $mod, M, exec, dms ipc call processlist toggle
bind = $mod, comma, exec, dms ipc call settings toggle
bind = $mod, N, exec, dms ipc call notifications toggle
bind = $mod SHIFT, N, exec, dms ipc call notepad toggle
bind = $mod, Y, exec, dms ipc call dankdash wallpaper
bind = $mod, TAB, exec, dms ipc call hypr toggleOverview
# bind = $mod, P, exec, hyprpicker | wl-copy

bind = $mod, E,exec, thunar


# === Noctalia ===
bind = $mod, X, exec, qs -c noctalia-shell ipc call sessionMenu toggle


# === Security ===
bind = $mod ALT, L, exec, qs -c noctalia-shell ipc call sessionMenu lockAndSuspend
bind = $mod SHIFT, E, exit
bind = CTRL ALT, Delete, exec, dms ipc call processlist toggle

# === Audio Controls ===
# DankMaterial
# bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 3
# bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 3
# bindl = , XF86AudioMute, exec, dms ipc call audio mute
# bindl = , XF86AudioMicMute, exec, dms ipc call audio micmute

# Noctalia
bindel = , XF86AudioRaiseVolume, exec, qs -c noctalia-shell ipc call volume increase
bindel = , XF86AudioLowerVolume, exec, qs -c noctalia-shell ipc call volume decrease
bindl = , XF86AudioMute, exec, dms ipc call audio mute
bindl = , XF86AudioMicMute, exec, qs -c noctalia-shell ipc call volume muteInput



# === Brightness Controls ===
bindel = , XF86MonBrightnessUp, exec, qs -c noctalia-shell ipc call brightness increase
bindel = , XF86MonBrightnessDown, exec, qs -c noctalia-shell ipc call brightness decrease

# === Window Management ===
bind = $mod, C, killactive
bind = $mod, F, fullscreen, 0
bind = $mod, Space, fullscreen, 1
bind = $mod, T, togglefloating
bind = $mod, W, togglegroup

# === Focus Navigation ===
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# === Window Movement ===
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# === Column Navigation ===
bind = $mod, Home, focuswindow, first
bind = $mod, End, focuswindow, last

# === Monitor Navigation ===
bind = $mod CTRL, left, focusmonitor, l
bind = $mod CTRL, right, focusmonitor, r
bind = $mod CTRL, H, focusmonitor, l
bind = $mod CTRL, J, focusmonitor, d
bind = $mod CTRL, K, focusmonitor, u
bind = $mod CTRL, L, focusmonitor, r

# === Move to Monitor ===
bind = $mod SHIFT CTRL, left, movewindow, mon:l
bind = $mod SHIFT CTRL, down, movewindow, mon:d
bind = $mod SHIFT CTRL, up, movewindow, mon:u
bind = $mod SHIFT CTRL, right, movewindow, mon:r
bind = $mod SHIFT CTRL, H, movewindow, mon:l
bind = $mod SHIFT CTRL, J, movewindow, mon:d
bind = $mod SHIFT CTRL, K, movewindow, mon:u
bind = $mod SHIFT CTRL, L, movewindow, mon:r

# === Workspace Navigation ===
bind = $mod, Page_Down, workspace, e+1
bind = $mod, Page_Up, workspace, e-1
bind = $mod, U, workspace, e+1
bind = $mod, I, workspace, e-1
bind = $mod CTRL, down, movetoworkspace, e+1
bind = $mod CTRL, up, movetoworkspace, e-1
bind = $mod CTRL, U, movetoworkspace, e+1
bind = $mod CTRL, I, movetoworkspace, e-1

# === Special Workspaces ===
bind = $mod, M, togglespecialworkspace, communication
bind = $mod, P, togglespecialworkspace, multimedia
bind = $mod, O, togglespecialworkspace, apps

bind = $mod SHIFT, M, movetoworkspace, special:communication
bind = $mod SHIFT, P, movetoworkspace, special:multimedia
bind = $mod SHIFT, O, movetoworkspace, special:apps

# === Move Workspaces ===
bind = $mod SHIFT, Page_Down, movetoworkspace, e+1
bind = $mod SHIFT, Page_Up, movetoworkspace, e-1
bind = $mod SHIFT, U, movetoworkspace, e+1
bind = $mod SHIFT, I, movetoworkspace, e-1

# === Mouse Wheel Navigation ===
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1
bind = $mod CTRL, mouse_down, movetoworkspace, e+1
bind = $mod CTRL, mouse_up, movetoworkspace, e-1

# === Numbered Workspaces ===
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# === Move to Numbered Workspaces ===
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# === Column Management ===
bind = $mod, bracketleft, layoutmsg, preselect l
bind = $mod, bracketright, layoutmsg, preselect r

# === Sizing & Layout ===
bind = $mod, R, layoutmsg, togglesplit
bind = $mod CTRL, F, resizeactive, exact 100%

# === Move/resize windows with mainMod + LMB/RMB and dragging ===
bind = $mod ALT, mouse:272, togglefloating
bindmd = $mod, mouse:272, Move window, movewindow
bindmd = $mod, mouse:273, Resize window, resizewindow

# === Move/resize windows with mainMod + LMB/RMB and dragging ===
bindd = $mod, code:20, Expand window left, resizeactive, -100 0
bindd = $mod, code:21, Shrink window left, resizeactive, 100 0

# === Manual Sizing ===
binde = $mod, minus, resizeactive, -10% 0
binde = $mod, equal, resizeactive, 10% 0
binde = $mod SHIFT, minus, resizeactive, 0 -10%
binde = $mod SHIFT, equal, resizeactive, 0 10%

# === Screenshots ===
bind = $mod, S, exec, grimblast copysave area
bind = , XF86Launch1, exec, grimblast copy area
bind = CTRL, XF86Launch1, exec, grimblast copy screen
bind = ALT, XF86Launch1, exec, grimblast copy active
bind = , Print, exec, grimblast copy area
bind = CTRL, Print, exec, grimblast copy screen
bind = ALT, Print, exec, grimblast copy active

# === System Controls ===
# bind = $mod SHIFT, P, dpms, off

# === Keyboard Layouts ===
bind = $mod ALT, Space, exec, ~/.local/bin/toggle-kb.sh
